name: Deploy Proxy to Railway

on:
  push:
    branches: [main]
    paths:
      - "proxy/**"
      - ".github/workflows/deploy-proxy-railway.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy proxy service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN || secrets.RAILWAY_API_TOKEN || secrets.RAILWAY_API_KEY }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing RAILWAY_TOKEN secret"
            exit 1
          fi

          if [ -n "$RAILWAY_PROJECT_ID" ]; then
            echo "Linking Railway project: ${RAILWAY_PROJECT_ID}"
            railway link --project "$RAILWAY_PROJECT_ID"
          else
            echo "RAILWAY_PROJECT_ID is not set; relying on token default project context"
          fi

          if [ -n "$RAILWAY_SERVICE" ]; then
            echo "Deploy target service: ${RAILWAY_SERVICE}"
            SERVICE_ARGS=(--service "$RAILWAY_SERVICE")
          else
            echo "RAILWAY_SERVICE is not set; deploying to linked/default service"
            SERVICE_ARGS=()
          fi

          cd proxy
          railway up --ci "${SERVICE_ARGS[@]}"
        shell: bash
