name: Deploy Proxy to Railway

on:
  push:
    branches: [main]
    paths:
      - "proxy/**"
      - ".github/workflows/deploy-proxy-railway.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy proxy service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN || secrets.RAILWAY_API_TOKEN || secrets.RAILWAY_API_KEY || vars.RAILWAY_TOKEN || vars.RAILWAY_API_TOKEN || vars.RAILWAY_API_KEY }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE || vars.RAILWAY_SERVICE }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID || vars.RAILWAY_PROJECT_ID || secrets.RAILWAY_PROJECT || vars.RAILWAY_PROJECT || secrets.RAILWAY_PROJECTID || vars.RAILWAY_PROJECTID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Missing Railway token. Set one of: RAILWAY_TOKEN, RAILWAY_API_TOKEN, or RAILWAY_API_KEY in repository Secrets or Variables."
            exit 1
          fi

          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "::error::Missing RAILWAY_PROJECT_ID. Set it in repository Secrets or Variables so CI can link the target Railway project."
            exit 1
          fi

          if [ -z "$RAILWAY_SERVICE" ]; then
            echo "::error::Missing RAILWAY_SERVICE. Set it to the Railway service name for the Node proxy (for example: proxy)."
            exit 1
          fi

          railway whoami || {
            echo "::error::Railway authentication failed. Verify the token value and permissions."
            exit 1
          }

          cd proxy

          echo "Linking Railway project: ${RAILWAY_PROJECT_ID}"
          railway link --project "$RAILWAY_PROJECT_ID"

          echo "Deploy target service: ${RAILWAY_SERVICE}"
          SERVICE_ARGS=(--service "$RAILWAY_SERVICE")

          railway up --ci "${SERVICE_ARGS[@]}"
        shell: bash
