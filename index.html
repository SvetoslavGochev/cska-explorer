<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSKA EXPLORER</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preload" as="image" href="assets/22142-CAM-002-scaled.jpg" media="(min-width: 901px)" fetchpriority="high" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>CSKA EXPLORER</h1>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Efbet Лига - Класиране</h2>
        <div class="table-wrap">
          <table class="table" id="standingsTable">
            <thead>
              <tr>
                <th>#</th><th>Отбор</th><th>М</th><th>П</th><th>Р</th><th>З</th><th>ГР</th><th>Т</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <p class="small">Източник: <a href="https://www.flashscore.bg/soccer/bulgaria/efbet/#/ID1TwQHr/standings/overall/" target="_blank" rel="noreferrer">Flashscore Efbet standings</a></p>
      </article>

      <aside class="flex-col">
        <article class="card">
          <h2>Следващи мачове на ЦСКА</h2>
          <ul class="list" id="nextMatches"></ul>
        </article>
        <article class="card">
          <h2>Последни резултати</h2>
          <ul class="list" id="lastResults"></ul>
        </article>
      </aside>
    </section>

    <section class="card" style="margin-top:16px;">
      <h2>Състав на ЦСКА София</h2>
      <div class="squad-grid" id="squadGrid"></div>
      <p class="small" id="sourceNote"></p>
      <p class="small status-ok" id="statusLine"></p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
